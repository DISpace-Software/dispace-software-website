<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeatMap Beta | DISpace Software</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="product-pages.css" />
  </head>
  <body>
    <header class="product-header">
      <a class="brand" href="index.html#seatmap">
        <img src="assets/seatmap/seatmap-logo-icon.jpg" alt="" />
        <span>SeatMap by DISpace Software</span>
      </a>
      <a class="back-link" href="index.html#seatmap">Назад на главную</a>
    </header>

    <main class="product-main">
      <section class="hero-page">
        <div>
          <p class="eyebrow">Private beta access</p>
          <h1>Попробуйте SeatMap в beta-режиме</h1>
          <p class="lead">
            Оставьте заявку на демонстрацию Restaurant OS: интерактивная карта,
            CRM гостей, digital menu, заказы и операционная панель ресторана.
          </p>
          <form class="panel">
            <input type="text" name="name" placeholder="Ваше имя" />
            <input type="email" name="email" placeholder="Email" />
            <input type="text" name="restaurant" placeholder="Название ресторана" />
            <select name="format">
              <option>Premium restaurant</option>
              <option>Fine dining</option>
              <option>Beach club / rooftop</option>
              <option>Hotel restaurant</option>
            </select>
            <textarea name="message" rows="5" placeholder="Что хотите протестировать первым?"></textarea>
            <button class="button" type="submit">Запросить beta-доступ</button>
          </form>
        </div>
        <div class="hero-art">
          <img src="assets/seatmap/seatmap-crm-screen.jpg" alt="SeatMap CRM preview" />
        </div>
      </section>
    </main>

    <footer class="product-footer">SeatMap — Restaurant Operating System</footer>
  </body>
</html>
